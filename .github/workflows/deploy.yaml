name: Deploy ibtikarchart to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up kubeconfig from secret
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Set up Helm
      uses: azure/setup-helm@v3

    - name: Remove duplicate "http" port from Service if exists
      run: |
        set -e
        INDEXES=$(kubectl get svc ibtikarchart-rocketchat -n ibtikarchart -o json | jq '.spec.ports | to_entries | map(select(.value.name == "http")) | .[].key' | sort -r)
        for i in $INDEXES; do
          echo "Removing duplicate port index: $i"
          kubectl patch svc ibtikarchart-rocketchat -n ibtikarchart --type='json' -p="[{'op': 'remove', 'path': '/spec/ports/$i'}]"
        done
      shell: bash
      continue-on-error: true

    - name: Deploy with Helm
      run: |
        helm dependency update .
        helm upgrade --install ibtikarchart . -n ibtikarchart --create-namespace
