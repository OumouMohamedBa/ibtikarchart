name: Deploy ibtikarchart to Kubernetes

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config

    - name: Helm dependencies
      run: helm dependency update ./ibtikarchart

    - name: Helm upgrade
      run: |
        helm upgrade --install ibtikarchart ./ibtikarchart -n ibtikarchart --create-namespace
